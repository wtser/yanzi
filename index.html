<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>燕子飞训练</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(150deg, #fce7f3 0%, #ede9fe 45%, #d1fae5 100%);
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 16px 56px;
    }

    .wrap {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 900;
      color: #5b21b6;
      letter-spacing: 0.5px;
    }

    .header p {
      font-size: 13px;
      color: #7c3aed;
      opacity: 0.65;
      margin-top: 3px;
    }

    /* ── Main card ── */
    .main-card {
      background: white;
      border-radius: 32px;
      padding: 28px 22px 22px;
      box-shadow:
        0 8px 40px rgba(124, 58, 237, 0.13),
        0 2px 8px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Phase row */
    .phase-display {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .phase-emoji {
      font-size: 26px;
      line-height: 1;
      transition: all 0.25s ease;
    }

    .phase-label {
      font-size: 18px;
      font-weight: 800;
      color: #7c3aed;
      transition: color 0.3s ease;
    }

    .phase-label.rest   { color: #059669; }
    .phase-label.paused { color: #d97706; }
    .phase-label.done   { color: #db2777; }

    /* Timer */
    .timer {
      font-variant-numeric: tabular-nums;
      font-size: clamp(80px, 22vw, 108px);
      font-weight: 900;
      letter-spacing: 3px;
      line-height: 1;
      margin: 10px 0 14px;
      color: #5b21b6;
      transition: color 0.3s ease;
      text-shadow: 0 4px 24px rgba(124, 58, 237, 0.18);
    }

    .timer.phase-rest {
      color: #059669;
      text-shadow: 0 4px 24px rgba(16, 185, 129, 0.2);
    }

    /* Set counter pill */
    .set-pill {
      background: #f5f3ff;
      border-radius: 999px;
      padding: 10px 28px;
      font-size: 16px;
      font-weight: 700;
      color: #7c3aed;
      margin-bottom: 18px;
      white-space: nowrap;
    }

    .set-pill .big {
      font-size: 22px;
      color: #5b21b6;
    }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      background: #f3f4f6;
      border-radius: 999px;
      height: 12px;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      border-radius: 999px;
      transition: width 120ms linear, background 0.4s ease;
    }

    .progress-bar.rest {
      background: linear-gradient(90deg, #10b981, #34d399);
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .btn-main {
      flex: 1;
      border: none;
      background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
      color: white;
      font-size: 22px;
      font-weight: 900;
      padding: 20px;
      border-radius: 22px;
      cursor: pointer;
      transition: transform 130ms ease, box-shadow 130ms ease;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.38);
      letter-spacing: 0.5px;
    }

    .btn-main:active { transform: scale(0.96); box-shadow: none; }
    .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-reset {
      flex: 0 0 auto;
      border: 2px solid #e5e7eb;
      background: white;
      color: #9ca3af;
      font-size: 15px;
      font-weight: 700;
      padding: 20px 18px;
      border-radius: 22px;
      cursor: pointer;
      transition: transform 130ms ease, border-color 130ms ease, color 130ms ease;
    }

    .btn-reset:hover  { border-color: #fca5a5; color: #ef4444; }
    .btn-reset:active { transform: scale(0.96); }

    /* Toast */
    .toast-area {
      margin-top: 14px;
      min-height: 22px;
      text-align: center;
    }

    #toast {
      font-size: 13px;
      color: #8b5cf6;
      font-weight: 600;
      line-height: 1.4;
    }

    /* ── Settings panel ── */
    .settings-panel {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    }

    .settings-panel summary {
      padding: 15px 20px;
      font-size: 14px;
      font-weight: 700;
      color: #6b7280;
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }

    .settings-panel summary::-webkit-details-marker { display: none; }
    .settings-panel[open] summary { border-bottom: 1px solid #f3f4f6; }

    .settings-body {
      padding: 16px 20px 20px;
    }

    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    input[inputmode="numeric"] {
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 16px;
      font-weight: 700;
      color: #374151;
      background: #f9fafb;
      outline: none;
      width: 100%;
      transition: border-color 150ms;
    }

    input[inputmode="numeric"]:focus { border-color: #7c3aed; }

    input[type="checkbox"] {
      width: 44px;
      height: 26px;
      cursor: pointer;
      accent-color: #7c3aed;
      margin-top: 2px;
    }

    select {
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      background: #f9fafb;
      outline: none;
      width: 100%;
      transition: border-color 150ms;
    }

    select:focus { border-color: #7c3aed; }

    .span2 { grid-column: span 2; }

    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 12px;
      line-height: 1.5;
    }

    /* Hidden elements kept for JS compatibility */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="header">
      <h1>🐦 燕子飞训练</h1>
      <p>加油！坚持就是胜利 ✨</p>
    </div>

    <div class="main-card">
      <div class="phase-display">
        <span class="phase-emoji" id="phaseEmoji">🐦</span>
        <span class="phase-label" id="stageText">准备开始</span>
      </div>

      <p class="timer" id="timerText">02:00</p>

      <div class="set-pill">
        第 <span class="big" id="currentSet">1</span> 组 / <span id="totalSets">22</span> 组
        &nbsp;·&nbsp; 完成 <span id="completedSets">0</span> 组
      </div>

      <div class="progress-wrap">
        <div class="progress-bar" id="phaseBar"></div>
      </div>

      <div class="btn-group">
        <button class="btn-main" id="btnMain">开始</button>
        <button class="btn-reset" id="btnReset">重置 🔄</button>
      </div>

      <div class="toast-area">
        <div id="toast"></div>
      </div>
    </div>

    <details class="settings-panel">
      <summary>⚙️ 设置</summary>
      <div class="settings-body">
        <div class="config-grid">
          <label>
            训练时长（秒）
            <input id="workSeconds" inputmode="numeric" pattern="[0-9]*" value="120" />
          </label>
          <label>
            休息时长（秒）
            <input id="restSeconds" inputmode="numeric" pattern="[0-9]*" value="10" />
          </label>
          <label>
            组数
            <input id="setCount" inputmode="numeric" pattern="[0-9]*" value="22" />
          </label>
          <label>
            声音提示
            <input id="soundToggle" type="checkbox" checked />
          </label>
          <label class="span2">
            语音音色
            <select id="voiceSelect">
              <option value="">系统默认</option>
            </select>
          </label>
          <label>
            防止息屏
            <input id="wakeLockToggle" type="checkbox" checked />
          </label>
        </div>
        <p class="hint">修改后下次开始时生效。</p>
      </div>
    </details>

    <!-- Hidden elements required by JS -->
    <span class="sr-only" id="targetSets">22</span>
    <span class="sr-only" id="stageDot"></span>
    <span class="sr-only" id="phaseProgressText">0%</span>
    <span class="sr-only" id="todaySummary"></span>
    <span class="sr-only" id="runState"></span>
    <span class="sr-only" id="wakeLockState"></span>
    <span class="sr-only" id="persistState"></span>
  </div>

  <script>
    const STORAGE_KEY = 'yanzi_fly_v1';

    const els = {
      stageDot: document.getElementById('stageDot'),
      stageText: document.getElementById('stageText'),
      phaseEmoji: document.getElementById('phaseEmoji'),
      timerText: document.getElementById('timerText'),
      currentSet: document.getElementById('currentSet'),
      totalSets: document.getElementById('totalSets'),
      targetSets: document.getElementById('targetSets'),
      completedSets: document.getElementById('completedSets'),
      btnMain: document.getElementById('btnMain'),
      btnReset: document.getElementById('btnReset'),
      toast: document.getElementById('toast'),
      phaseBar: document.getElementById('phaseBar'),
      phaseProgressText: document.getElementById('phaseProgressText'),
      workSeconds: document.getElementById('workSeconds'),
      restSeconds: document.getElementById('restSeconds'),
      setCount: document.getElementById('setCount'),
      soundToggle: document.getElementById('soundToggle'),
      voiceSelect: document.getElementById('voiceSelect'),
      wakeLockToggle: document.getElementById('wakeLockToggle'),
      todaySummary: document.getElementById('todaySummary'),
      runState: document.getElementById('runState'),
      wakeLockState: document.getElementById('wakeLockState'),
      persistState: document.getElementById('persistState'),
    };

    const defaultConfig = { workSeconds: 120, restSeconds: 10, totalSets: 22, sound: true, voiceURI: '', wakeLock: true };

    let tickTimer = null;

    let state = {
      config: { ...defaultConfig },
      phase: 'idle',
      running: false,
      paused: false,
      currentSet: 1,
      completedSets: 0,
      phaseDurationMs: 120000,
      phaseRemainingMs: 120000,
      lastTs: null,
      startedAtLocalISO: null,
      lastSavedAt: null,
    };

    function nowMs() {
      return performance && performance.now ? performance.now() : Date.now();
    }

    function clamp(n, min, max) {
      return Math.min(max, Math.max(min, n));
    }

    function pad2(n) {
      const s = String(Math.floor(n));
      return s.length >= 2 ? s : '0' + s;
    }

    function formatMs(ms) {
      const totalSec = Math.max(0, Math.ceil(ms / 1000));
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      return `${pad2(m)}:${pad2(s)}`;
    }

    function stageLabel(phase) {
      if (phase === 'work') return '训练中';
      if (phase === 'rest') return '休息中';
      if (phase === 'done') return '已完成 🎉';
      return '准备开始';
    }

    const phaseEmojis = { idle: '🐦', work: '💪', rest: '😌', done: '🎉' };

    function setDot(phase) {
      els.stageDot.classList.remove('work', 'rest', 'paused', 'done');
      if (phase === 'work') els.stageDot.classList.add('work');
      else if (phase === 'rest') els.stageDot.classList.add('rest');
      else if (phase === 'paused') els.stageDot.classList.add('paused');
      else if (phase === 'done') els.stageDot.classList.add('done');
      else els.stageDot.classList.add('done');
    }

    function toast(msg) {
      if (!els.toast) return;
      els.toast.textContent = msg;
    }

    function readConfigFromInputs() {
      const w = parseInt(String(els.workSeconds.value || ''), 10);
      const r = parseInt(String(els.restSeconds.value || ''), 10);
      const t = parseInt(String(els.setCount.value || ''), 10);
      const sound = !!els.soundToggle.checked;
      const voiceURI = String(els.voiceSelect && els.voiceSelect.value ? els.voiceSelect.value : '');
      const wakeLock = !!(els.wakeLockToggle && els.wakeLockToggle.checked);

      const workSeconds = Number.isFinite(w) ? clamp(w, 1, 3600) : defaultConfig.workSeconds;
      const restSeconds = Number.isFinite(r) ? clamp(r, 0, 3600) : defaultConfig.restSeconds;
      const totalSets = Number.isFinite(t) ? clamp(t, 1, 999) : defaultConfig.totalSets;

      return { workSeconds, restSeconds, totalSets, sound, voiceURI, wakeLock };
    }

    function applyConfigToInputs(cfg) {
      els.workSeconds.value = String(cfg.workSeconds);
      els.restSeconds.value = String(cfg.restSeconds);
      els.setCount.value = String(cfg.totalSets);
      els.soundToggle.checked = !!cfg.sound;

      if (els.voiceSelect) {
        els.voiceSelect.value = cfg.voiceURI ? String(cfg.voiceURI) : '';
      }

      if (els.wakeLockToggle) {
        els.wakeLockToggle.checked = cfg.wakeLock !== undefined ? !!cfg.wakeLock : true;
      }

      els.totalSets.textContent = String(cfg.totalSets);
      els.targetSets.textContent = String(cfg.totalSets);
    }

    function saveState() {
      const payload = {
        ...state,
        lastSavedAt: new Date().toISOString(),
      };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch (e) {
        if (els.persistState) els.persistState.textContent = '无法保存（浏览器限制）';
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return false;

        const cfg = parsed.config && typeof parsed.config === 'object' ? parsed.config : defaultConfig;
        const loadedConfig = {
          workSeconds: Number(cfg.workSeconds) || defaultConfig.workSeconds,
          restSeconds: Number(cfg.restSeconds) || defaultConfig.restSeconds,
          totalSets: Number(cfg.totalSets) || defaultConfig.totalSets,
          sound: cfg.sound !== undefined ? !!cfg.sound : defaultConfig.sound,
          voiceURI: cfg.voiceURI !== undefined ? String(cfg.voiceURI) : defaultConfig.voiceURI,
          wakeLock: cfg.wakeLock !== undefined ? !!cfg.wakeLock : defaultConfig.wakeLock,
        };

        state = {
          ...state,
          ...parsed,
          config: loadedConfig,
          running: false,
          paused: parsed.paused ? true : false,
          lastTs: null,
        };

        return true;
      } catch (e) {
        return false;
      }
    }

    function clearSavedState() {
      try {
        localStorage.removeItem(STORAGE_KEY);
      } catch (e) {}
    }

    function speak(text, delayMs) {
      if (!state.config.sound) return;
      const synth = window.speechSynthesis;
      const Utter = window.SpeechSynthesisUtterance;
      if (!synth || !Utter) return;

      const doSpeak = () => {
        try {
          const u = new Utter(text);
          u.lang = 'zh-CN';
          u.rate = 1;
          u.pitch = 1;
          u.volume = 1;

          if (state.config.voiceURI) {
            const voices = synth.getVoices ? synth.getVoices() : [];
            const v = voices.find((vv) => vv && vv.voiceURI === state.config.voiceURI);
            if (v) u.voice = v;
          }
          synth.speak(u);
        } catch (e) {}
      };

      try {
        synth.cancel();
      } catch (e) {}

      // Chrome bug: cancel() + immediate speak() silently drops the utterance
      setTimeout(doSpeak, delayMs != null ? delayMs : 80);
    }

    function initVoiceOptions() {
      if (!els.voiceSelect) return;
      const synth = window.speechSynthesis;
      if (!synth || !synth.getVoices) return;

      const voices = synth.getVoices();
      const zhVoices = voices.filter((v) => v && v.lang && String(v.lang).toLowerCase().startsWith('zh'));
      const previous = els.voiceSelect.value;
      const desired = state.config.voiceURI ? String(state.config.voiceURI) : '';

      els.voiceSelect.innerHTML = '<option value="">系统默认</option>';

      for (const v of zhVoices) {
        if (!v || !v.voiceURI) continue;
        const opt = document.createElement('option');
        opt.value = v.voiceURI;
        opt.textContent = v.lang ? `${v.name} (${v.lang})` : v.name;
        els.voiceSelect.appendChild(opt);
      }

      const trySet = (val) => {
        if (!val) return false;
        const exists = Array.from(els.voiceSelect.options).some((o) => o.value === val);
        if (!exists) return false;
        els.voiceSelect.value = val;
        return true;
      };

      const pickDefaultVoiceURI = () => {
        const googleCN = zhVoices.find((v) => v && v.lang === 'zh-CN' && v.name === 'Google 普通话（中国大陆）');
        if (googleCN && googleCN.voiceURI) return googleCN.voiceURI;

        const anyZhCN = zhVoices.find((v) => v && v.lang === 'zh-CN');
        if (anyZhCN && anyZhCN.voiceURI) return anyZhCN.voiceURI;

        const anyZh = zhVoices[0];
        if (anyZh && anyZh.voiceURI) return anyZh.voiceURI;

        return '';
      };

      const defaultVoiceURI = pickDefaultVoiceURI();

      if (trySet(desired)) return;
      if (trySet(previous)) return;
      if (!desired && defaultVoiceURI && trySet(defaultVoiceURI)) {
        state.config.voiceURI = defaultVoiceURI;
        saveState();
        return;
      }

      els.voiceSelect.value = '';
      if (state.config.voiceURI) {
        state.config.voiceURI = '';
        saveState();
      }
    }

    if (window.speechSynthesis && typeof window.speechSynthesis.addEventListener === 'function') {
      window.speechSynthesis.addEventListener('voiceschanged', () => {
        initVoiceOptions();
        state.config.voiceURI = els.voiceSelect && els.voiceSelect.value ? String(els.voiceSelect.value) : '';
        saveState();
      });
    }

    if (els.voiceSelect) {
      els.voiceSelect.addEventListener('change', () => {
        state.config.voiceURI = els.voiceSelect.value ? String(els.voiceSelect.value) : '';
        saveState();
        speak('语音音色已切换', 200);
      });
    }

    let wakeLockSentinel = null;

    function isWakeLockSupported() {
      return !!(navigator && navigator.wakeLock && typeof navigator.wakeLock.request === 'function');
    }

    function updateWakeLockUI() {
      if (!els.wakeLockState) return;
      if (!state.config.wakeLock) { els.wakeLockState.textContent = '已关闭'; return; }
      if (!isWakeLockSupported()) { els.wakeLockState.textContent = '不支持'; return; }
      if (wakeLockSentinel) { els.wakeLockState.textContent = '已开启'; return; }
      if (state.running && !state.paused && state.phase !== 'done') { els.wakeLockState.textContent = '申请中…'; return; }
      els.wakeLockState.textContent = '待开启';
    }

    async function requestWakeLock() {
      if (!state.config.wakeLock) return;
      if (!isWakeLockSupported()) { updateWakeLockUI(); return; }
      if (document.visibilityState !== 'visible') { updateWakeLockUI(); return; }
      try {
        wakeLockSentinel = await navigator.wakeLock.request('screen');
        wakeLockSentinel.addEventListener('release', () => {
          wakeLockSentinel = null;
          updateWakeLockUI();
        });
      } catch (e) {
        wakeLockSentinel = null;
      } finally {
        updateWakeLockUI();
      }
    }

    async function releaseWakeLock() {
      if (!wakeLockSentinel) { updateWakeLockUI(); return; }
      try {
        await wakeLockSentinel.release();
      } catch (e) {
      } finally {
        wakeLockSentinel = null;
        updateWakeLockUI();
      }
    }

    function syncWakeLockWithState() {
      if (state.running && !state.paused && state.phase !== 'done') {
        requestWakeLock();
      } else {
        releaseWakeLock();
      }
      updateWakeLockUI();
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') syncWakeLockWithState();
    });

    if (els.wakeLockToggle) {
      els.wakeLockToggle.addEventListener('change', () => {
        state.config.wakeLock = !!els.wakeLockToggle.checked;
        saveState();
        syncWakeLockWithState();
      });
    }

    function beep(freq, durationMs, gainValue) {
      if (!state.config.sound) return;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;

      const ctx = new AC();
      const o = ctx.createOscillator();
      const g = ctx.createGain();

      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.value = gainValue;

      o.connect(g);
      g.connect(ctx.destination);
      o.start();
      o.stop(ctx.currentTime + durationMs / 1000);

      setTimeout(() => { try { ctx.close(); } catch (e) {} }, durationMs + 60);
    }

    function updateUI() {
      const isPaused = state.paused && state.phase !== 'idle' && state.phase !== 'done';

      // Emoji
      if (els.phaseEmoji) {
        els.phaseEmoji.textContent = isPaused ? '⏸️' : (phaseEmojis[state.phase] || '🐦');
      }

      // Stage label + color class
      els.stageText.textContent = isPaused ? '已暂停' : stageLabel(state.phase);
      els.stageText.className = 'phase-label';
      if (isPaused) els.stageText.classList.add('paused');
      else if (state.phase === 'rest') els.stageText.classList.add('rest');
      else if (state.phase === 'done') els.stageText.classList.add('done');

      setDot(isPaused ? 'paused' : state.phase);

      // Timer color
      els.timerText.textContent = formatMs(state.phaseRemainingMs);
      els.timerText.classList.toggle('phase-rest', state.phase === 'rest');
      els.timerText.classList.toggle('phase-work', state.phase === 'work' && !isPaused);

      // Progress bar color
      els.phaseBar.classList.toggle('rest', state.phase === 'rest');

      els.currentSet.textContent = String(state.currentSet);
      els.completedSets.textContent = String(state.completedSets);
      els.totalSets.textContent = String(state.config.totalSets);
      els.targetSets.textContent = String(state.config.totalSets);

      const pct = state.phaseDurationMs > 0 ? (1 - state.phaseRemainingMs / state.phaseDurationMs) : 0;
      const pctClamped = clamp(pct, 0, 1);
      els.phaseBar.style.width = `${(pctClamped * 100).toFixed(1)}%`;
      els.phaseProgressText.textContent = `${Math.round(pctClamped * 100)}%`;

      if (els.btnMain) {
        if (state.phase === 'idle' || state.phase === 'done' || !state.running) {
          els.btnMain.textContent = '开始 🚀';
          els.btnMain.disabled = false;
        } else if (state.paused) {
          els.btnMain.textContent = '继续 ▶️';
          els.btnMain.disabled = false;
        } else {
          els.btnMain.textContent = '暂停 ⏸';
          els.btnMain.disabled = false;
        }
      }

      // Hidden state elements
      if (state.phase === 'done') els.runState.textContent = '已完成';
      else if (!state.running) els.runState.textContent = '未开始';
      else if (state.paused) els.runState.textContent = '暂停中';
      else els.runState.textContent = '进行中';

      const today = new Date();
      const day = `${today.getFullYear()}-${pad2(today.getMonth() + 1)}-${pad2(today.getDate())}`;
      const started = state.startedAtLocalISO ? new Date(state.startedAtLocalISO) : null;
      if (started) {
        const sday = `${started.getFullYear()}-${pad2(started.getMonth() + 1)}-${pad2(started.getDate())}`;
        els.todaySummary.textContent = sday === day
          ? `${state.completedSets}/${state.config.totalSets} 组`
          : `${state.completedSets}/${state.config.totalSets} 组（非今日）`;
      } else {
        els.todaySummary.textContent = `${state.completedSets}/${state.config.totalSets} 组`;
      }
    }

    function setPhase(phase, durationMs) {
      state.phase = phase;
      state.phaseDurationMs = Math.max(0, durationMs);
      state.phaseRemainingMs = Math.max(0, durationMs);
      state.lastTs = null;
      updateUI();
      saveState();
    }

    function startRoutine() {
      state.config = readConfigFromInputs();
      applyConfigToInputs(state.config);

      state.running = true;
      state.paused = false;
      state.completedSets = 0;
      state.currentSet = 1;
      state.startedAtLocalISO = new Date().toISOString();

      setPhase('work', state.config.workSeconds * 1000);
      toast(`开始训练：第 ${state.currentSet} 组燕子飞 💪`);
      speak(`开始训练，第${state.currentSet}组燕子飞`);
      beep(660, 160, 0.06);

      runTicker();
      syncWakeLockWithState();
    }

    function pauseRoutine() {
      if (!state.running || state.paused || state.phase === 'done') return;
      state.paused = true;
      state.lastTs = null;
      toast('训练暂停了，随时可以继续！');
      speak('暂停训练');
      beep(520, 140, 0.05);
      syncWakeLockWithState();
      updateUI();
      saveState();
    }

    function resumeRoutine() {
      if (!state.running || !state.paused || state.phase === 'done') return;
      state.paused = false;
      state.lastTs = null;
      toast('继续训练，加油！');
      speak('继续训练');
      beep(660, 160, 0.06);
      syncWakeLockWithState();
      updateUI();
      saveState();
    }

    function resetRoutine() {
      const ok = confirm('确定要重置吗？这会清空当前进度。');
      if (!ok) return;

      state.config = readConfigFromInputs();
      applyConfigToInputs(state.config);

      state.phase = 'idle';
      state.running = false;
      state.paused = false;
      state.currentSet = 1;
      state.completedSets = 0;
      state.phaseDurationMs = state.config.workSeconds * 1000;
      state.phaseRemainingMs = state.phaseDurationMs;
      state.lastTs = null;
      state.startedAtLocalISO = null;

      clearSavedState();
      toast('已重置，随时开始新的训练！');
      speak('重置训练');
      beep(392, 120, 0.05);
      setTimeout(() => beep(330, 160, 0.05), 140);
      syncWakeLockWithState();
      updateUI();
      saveState();
    }

    function finishRoutine() {
      state.phase = 'done';
      state.running = false;
      state.paused = false;
      state.phaseDurationMs = 0;
      state.phaseRemainingMs = 0;
      state.lastTs = null;
      toast('🎉 太棒了！训练全部完成！');
      speak('训练完成，太棒了');
      syncWakeLockWithState();
      updateUI();
      saveState();
      beep(880, 120, 0.06);
      setTimeout(() => beep(660, 140, 0.06), 160);
      setTimeout(() => beep(990, 160, 0.06), 340);
    }

    function stepTransition() {
      if (state.phase === 'work') {
        state.completedSets = state.currentSet;
        if (state.currentSet >= state.config.totalSets) {
          finishRoutine();
          return;
        }

        if (state.config.restSeconds > 0) {
          toast(`休息 ${state.config.restSeconds} 秒，喝口水 😌`);
          speak(`开始休息，${state.config.restSeconds}秒`);
          beep(440, 140, 0.05);
          setPhase('rest', state.config.restSeconds * 1000);
        } else {
          state.currentSet += 1;
          toast(`第 ${state.currentSet} 组，继续加油 💪`);
          speak(`开始训练，第${state.currentSet}组燕子飞`);
          beep(660, 160, 0.06);
          setPhase('work', state.config.workSeconds * 1000);
        }
        return;
      }

      if (state.phase === 'rest') {
        state.currentSet += 1;
        toast(`第 ${state.currentSet} 组，燕子飞！💪`);
        speak(`开始训练，第${state.currentSet}组燕子飞`);
        beep(660, 160, 0.06);
        setPhase('work', state.config.workSeconds * 1000);
        return;
      }
    }

    function tick(ts) {
      if (!state.running || state.paused || state.phase === 'done') return;

      if (state.lastTs == null) {
        state.lastTs = ts;
        return;
      }

      const delta = Math.max(0, ts - state.lastTs);
      state.lastTs = ts;

      state.phaseRemainingMs = Math.max(0, state.phaseRemainingMs - delta);
      updateUI();

      if (state.phaseRemainingMs <= 0) {
        stepTransition();
      }

      saveState();
    }

    function runTicker() {
      if (tickTimer) return;
      tickTimer = setInterval(() => { tick(nowMs()); }, 120);
    }

    function stopTickerIfIdle() {
      if (state.running) return;
      if (!tickTimer) return;
      clearInterval(tickTimer);
      tickTimer = null;
    }

    function toggleStartPauseBySpace() {
      if (state.phase === 'idle' || state.phase === 'done') { startRoutine(); return; }
      if (!state.running) {
        state.running = true;
        state.paused = false;
        runTicker();
        updateUI();
        saveState();
        return;
      }
      if (state.paused) resumeRoutine();
      else pauseRoutine();
    }

    function handleMainButton() {
      if (state.phase === 'idle' || state.phase === 'done' || !state.running) { startRoutine(); return; }
      if (state.paused) { resumeRoutine(); return; }
      pauseRoutine();
    }

    if (els.btnMain) els.btnMain.addEventListener('click', handleMainButton);
    els.btnReset.addEventListener('click', resetRoutine);

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        toggleStartPauseBySpace();
      }
    });

    function boot() {
      const loaded = loadState();

      if (loaded) {
        applyConfigToInputs(state.config);
        if (state.phase === 'idle' || state.phase === 'done') {
          toast('已恢复上次进度，点击开始继续 🐦');
        } else {
          toast('上次进度已恢复，点击继续 ▶️');
          state.running = true;
          state.paused = true;
          runTicker();
        }
      } else {
        state.config = readConfigFromInputs();
        applyConfigToInputs(state.config);
        state.phaseDurationMs = state.config.workSeconds * 1000;
        state.phaseRemainingMs = state.phaseDurationMs;
        saveState();
      }

      initVoiceOptions();
      syncWakeLockWithState();
      updateUI();
      stopTickerIfIdle();
    }

    boot();
  </script>
</body>
</html>
